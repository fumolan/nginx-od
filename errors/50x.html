<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - 服务异常</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
        }
        .error-code {
            font-size: 80px;
            font-weight: 700;
            color: #f5576c;
            line-height: 1;
        }
        .error-title {
            font-size: 24px;
            color: #333;
            margin: 20px 0 10px;
        }
        .error-desc {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
        }
        .error-status {
            font-size: 14px;
            color: #999;
            margin-bottom: 20px;
        }
        .btn-home {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-size: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(245,87,108,0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">50x</div>
        <h1 class="error-title">服务暂时不可用</h1>
        <p class="error-desc">服务器遇到了问题，请稍后再试</p>
        <p class="error-status">状态码: <!--STATUS--></p>
        <a href="/" class="btn-home">返回首页</a>
    </div>
</body>
</html>
