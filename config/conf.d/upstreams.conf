# ============================================
# 上游微服务定义
# ============================================

# 用户服务
upstream user_service {
    zone user_service 64k;
    least_conn;
    server 10.0.1.10:8080 weight=3 max_fails=3 fail_timeout=30s;
    server 10.0.1.11:8080 weight=2 max_fails=3 fail_timeout=30s;
    server 10.0.1.12:8080 weight=2 max_fails=3 fail_timeout=30s;
    server 10.0.1.13:8080 backup;
}

# 商品服务
upstream product_service {
    zone product_service 64k;
    least_conn;
    server 10.0.1.20:8081 weight=3 max_fails=3 fail_timeout=30s;
    server 10.0.1.21:8081 weight=2 max_fails=3 fail_timeout=30s;
    server 10.0.1.22:8081 weight=2 max_fails=3 fail_timeout=30s;
}

# 订单服务
upstream order_service {
    zone order_service 64k;
    least_conn;
    server 10.0.1.30:8082 weight=3 max_fails=3 fail_timeout=30s;
    server 10.0.1.31:8082 weight=2 max_fails=3 fail_timeout=30s;
}

# 支付服务
upstream payment_service {
    zone payment_service 64k;
    least_conn;
    server 10.0.1.40:8083 weight=2 max_fails=3 fail_timeout=30s;
    server 10.0.1.41:8083 weight=2 max_fails=3 fail_timeout=30s;
}

# 通知服务（WebSocket）
upstream notification_service {
    zone notification_service 64k;
    least_conn;
    server 10.0.1.50:8084 weight=2 max_fails=3 fail_timeout=30s;
    server 10.0.1.51:8084 weight=2 max_fails=3 fail_timeout=30s;
}

# 上传服务
upstream upload_service {
    zone upload_service 64k;
    least_conn;
    server 10.0.1.60:8085 weight=2 max_fails=3 fail_timeout=30s;
}

# 管理后台服务
upstream admin_service {
    zone admin_service 64k;
    least_conn;
    server 10.0.1.70:8086 weight=2 max_fails=3 fail_timeout=30s;
}

# 前端应用
upstream frontend_service {
    zone frontend_service 64k;
    least_conn;
    server 10.0.1.100:3000 weight=3 max_fails=3 fail_timeout=30s;
    server 10.0.1.101:3000 weight=3 max_fails=3 fail_timeout=30s;
}

# 连接池复用（用于 proxy_pass 的通用后端）
upstream backend_pool {
    keepalive 32;
    zone backend 64k;
    least_conn;
    server 10.0.1.10:8080;
    server 10.0.1.11:8080;
}
